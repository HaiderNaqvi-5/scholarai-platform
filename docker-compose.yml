services:
  backend:
    build: ./backend
    command: sh -c "python scripts/bootstrap_local.py && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    env_file: ${ENV_FILE:-.env.example}
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    env_file: ${ENV_FILE:-.env.example}
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: scholarai
      POSTGRES_USER: scholarai
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  celery-worker:
    build: ./backend
    command: celery -A app.tasks.celery_app:celery_app worker -l info
    env_file: ${ENV_FILE:-.env.example}
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
