services:
  web:
    image: node:20-alpine
    working_dir: /workspace/apps/web
    command: sh -c "npm install && npm run dev"
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    volumes:
      - ../..:/workspace
    ports:
      - "3000:3000"
    depends_on:
      - api

  api:
    image: python:3.11-slim
    working_dir: /workspace/apps/api
    command: sh -c "pip install --no-cache-dir -e . && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://scholarai:change-me@postgres:5432/scholarai}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    volumes:
      - ../..:/workspace
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  workers:
    image: python:3.11-slim
    working_dir: /workspace/workers
    command: sh -c "pip install --no-cache-dir -e . && celery -A app.celery_app worker -l info"
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    volumes:
      - ../..:/workspace
    depends_on:
      - redis

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-scholarai}
      POSTGRES_USER: ${POSTGRES_USER:-scholarai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "5432:5432"
    volumes:
      - scholarai-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  scholarai-postgres:
